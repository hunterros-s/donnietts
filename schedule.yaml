defaults:
  lead_minutes: 5

announcements:
  - time: "08:00"
    template: "Good morning. The time is {time}. Today is {weekday}, {date}. Currently in {location}, it is {weather_condition} and {current_temp} degrees. Today's high is {high_temp} degrees."

  - time: "09:00"
    template: "The time is {time}. Today is {weekday}, {date}. The temperature is {current_temp} degrees."

  - time: "10:00"
    template: "This is your ten o'clock update. Today is {weekday}, {date}. Current conditions are {weather_condition}."

  - time: "11:00"
    template: "The current time is {time}. Today is {weekday}, {date}. Currently in {location}, it is {current_temp} degrees."

  - time: "12:00"
    template: "It is noon. Today is {weekday}, {date}. Currently in {location}, it is {weather_condition} and {current_temp} degrees."

  - time: "13:00"
    template: "This is your afternoon update. The time is {time}. Today is {weekday}, {date}. Today's high is {high_temp} degrees."

  - time: "14:00"
    template: "The time now is {time}. Today is {weekday}, {date}. The weather is {weather_condition}."

  - time: "15:00"
    template: "Here is your three o'clock update. Today is {weekday}, {date}. The temperature is {current_temp} degrees."

  - time: "16:00"
    template: "The current time is {time}. Today is {weekday}, {date}. Currently in {location}, it is {current_temp} degrees."

  - time: "17:00"
    template: "This is your five o'clock update. Today is {weekday}, {date}. Current conditions are {weather_condition}."

  - time: "18:00"
    template: "Good evening. The time is {time}. Today is {weekday}, {date}. Currently in {location}, it is {current_temp} degrees."

  - time: "19:00"
    template: "Evening check-in. The time is {time}. Today is {weekday}, {date}."

  - time: "20:00"
    template: "The time now is {time}. Today is {weekday}, {date}."

  - time: "21:00"
    template: "Good night. The time is {time}. Today is {weekday}, {date}."
